<!DOCTYPE HTML >
<title>Contacto</title>
<body>
  <form action="/procesar-datos" method="POST">
    <div class="nombre">
      <label for="nombre">Nombre:</label>
      <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre">
    </div>
    <div class="apellidos">
      <label for="apellidos">Apellidos:</label>
      <input type="text" id="apellidos" name="apellidos" required placeholder="Tus apellidos">
    </div>
    <div class="email">
      <label for="correo">Email:</label>
      <input type="email" id="correo" name="correo" required placeholder="ejemplo@gmail.com">
    </div>
    <div class="telefono">
      <label for="Teléfono">Teléfono:</label>
      <input type="tel" id="Teléfono" name="Teléfono" placeholder="Tu número de teléfono">
    </div>
      <div class="consulta">
      <label for="consulta">Consulta:</label> 
      <textarea id="consulta" name="consulta" rows="15" cols="50" required placeholder="Escribe tu consulta aquí"></textarea>
    </div>

    <div class="botones">
      <button type="reset" id="resetButton">Borrar</button>
      <button type="submit" id="submitButton">Enviar</button>
    </div>
  </form>
  <script src="script.js"></script>
</body>

<div class="linkinicio">
  <p>¿Deseas volver a la página de inicio?<br>Click aquí:</p>
 <a href="Pagina_Web_Tiendaderopa.html"><b>Inicio</b></a>
</div>
<link rel="stylesheet" href="estiloscontacto.css">
</form>
